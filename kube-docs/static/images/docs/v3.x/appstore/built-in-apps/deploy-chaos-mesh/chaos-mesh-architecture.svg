<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <rect width="1200" height="520" rx="24" fill="#0F172A"/>
  <text x="56" y="60" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">Chaos Mesh Architecture</text>
  <text x="56" y="94" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">Chaos experiments are defined in the dashboard and controller, then executed by chaos daemons against selected workloads.</text>

  <rect x="56" y="150" width="250" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="86" y="192" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Chaos Dashboard</text>
  <text x="86" y="224" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Create and observe experiments</text>

  <rect x="370" y="150" width="250" height="110" rx="18" fill="#1E293B" stroke="#334155"/>
  <text x="400" y="192" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Controller Manager</text>
  <text x="400" y="224" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Schedules and reconciles chaos CRs</text>

  <rect x="684" y="150" width="200" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="732" y="192" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Webhook</text>
  <text x="714" y="224" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Validates experiment specs</text>

  <rect x="948" y="150" width="196" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="984" y="192" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Scheduler</text>
  <text x="976" y="224" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Handles timing and cycles</text>

  <rect x="240" y="330" width="720" height="116" rx="20" fill="#0B1220" stroke="#334155"/>
  <text x="268" y="372" fill="#38BDF8" font-family="Arial, sans-serif" font-size="24" font-weight="700">Chaos Daemon and Target Workloads</text>
  <text x="268" y="404" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="17">Inject network, pod, stress, IO, or time faults into selected Pods, nodes, or containers.</text>

  <path d="M306 205H360" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M620 205H674" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M884 205H948" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 260V312" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
</svg>
