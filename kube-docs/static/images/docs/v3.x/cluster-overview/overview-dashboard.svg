  <text x="886" y="561" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">N</text>
  <text x="908" y="552" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13">node-gpu-03</text>
  <text x="908" y="568" fill="#64748B" font-family="Arial, sans-serif" font-size="11">192.168.1.13</text>
  <text x="1172" y="560" fill="#38BDF8" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">66%</text>

  <!-- node-4 -->
  <circle cx="886" cy="606" r="14" fill="#1E293B"/>
  <text x="886" y="611" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">N</text>
  <text x="908" y="602" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13">node-cpu-01</text>
  <text x="908" y="618" fill="#64748B" font-family="Arial, sans-serif" font-size="11">192.168.1.21  Master</text>
  <text x="1172" y="610" fill="#38BDF8" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">51%</text>

