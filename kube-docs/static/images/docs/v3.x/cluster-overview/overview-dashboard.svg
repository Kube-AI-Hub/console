  <text x="196" y="374" fill="#86EFAC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">K8s</text>
  <circle cx="252" cy="368" r="18" fill="#3B1F6E"/>
  <text x="252" y="374" fill="#C4B5FD" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Istio</text>
