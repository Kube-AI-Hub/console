  <text x="1040" y="258" fill="#64748B" font-family="Arial, sans-serif" font-size="12">API request latency</text>
  <line x1="868" y1="272" x2="1204" y2="272" stroke="#1E293B" stroke-width="1"/>
  <text x="868" y="302" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">642</text>
  <text x="868" y="322" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Scheduling operations</text>
  <text x="1040" y="302" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">2</text>
  <text x="1040" y="322" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Scheduling failures</text>

