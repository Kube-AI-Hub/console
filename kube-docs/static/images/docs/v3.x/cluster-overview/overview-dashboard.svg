  <circle cx="886" cy="656" r="14" fill="#1E293B"/>
  <text x="886" y="661" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">N</text>
  <text x="908" y="652" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13">node-cpu-02</text>
  <text x="908" y="668" fill="#64748B" font-family="Arial, sans-serif" font-size="11">192.168.1.22</text>
  <text x="1172" y="660" fill="#38BDF8" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">38%</text>

  <!-- View More button -->
