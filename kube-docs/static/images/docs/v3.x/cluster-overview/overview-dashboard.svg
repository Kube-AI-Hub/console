  <text x="908" y="502" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13">node-gpu-02</text>
  <text x="908" y="518" fill="#64748B" font-family="Arial, sans-serif" font-size="11">192.168.1.12</text>
  <text x="1172" y="510" fill="#38BDF8" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">74%</text>

  <!-- node-3 -->
