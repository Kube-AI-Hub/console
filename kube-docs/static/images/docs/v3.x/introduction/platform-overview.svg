<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" rx="20" fill="#0F172A"/>

  <!-- Title -->
  <text x="600" y="48" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Kube AI Hub Platform Feature Overview</text>
