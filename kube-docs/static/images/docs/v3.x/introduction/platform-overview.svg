  <text x="688" y="232" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">CRD management</text>
  <text x="688" y="248" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">(admin only)</text>

