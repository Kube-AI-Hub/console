  <text x="462" y="232" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Network Policies</text>
  <text x="462" y="248" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Pod IP Pools  / Gateway</text>

