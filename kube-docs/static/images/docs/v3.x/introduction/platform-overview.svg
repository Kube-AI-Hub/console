  <line x1="619" y1="500" x2="832" y2="500" stroke="#78350F" stroke-width="1"/>
  <text x="725" y="524" fill="#92400E" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Multi-tenant log isolation</text>
  <text x="725" y="542" fill="#92400E" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Elasticsearch  / Kafka  / Fluentd</text>

  <!-- Access Control -->
  <rect x="870" y="460" width="274" height="100" rx="16" fill="#0A0A1A" stroke="#4338CA"/>
  <text x="1007" y="490" fill="#818CF8" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Access &amp; Auth</text>
  <line x1="890" y1="500" x2="1124" y2="500" stroke="#312E81" stroke-width="1"/>
  <text x="1007" y="524" fill="#4338CA" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">LDAP  / AD  / SSO integration</text>
  <text x="1007" y="542" fill="#4338CA" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Role-based fine-grained auth</text>

