  <text x="302" y="533" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Workspace Manager</text>
  <rect x="388" y="510" width="148" height="36" rx="8" fill="#111827" stroke="#334155"/>
  <text x="462" y="533" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Project Member</text>

