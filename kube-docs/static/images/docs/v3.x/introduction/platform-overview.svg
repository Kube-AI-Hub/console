  <text x="600" y="608" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Heterogeneous Hardware Kubernetes Infrastructure</text>
  <line x1="76" y1="618" x2="1124" y2="618" stroke="#1E293B" stroke-width="1"/>

  <rect x="80" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="140" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">NVIDIA GPU</text>
  <rect x="216" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="276" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Huawei Ascend</text>
  <rect x="352" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="412" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Cambricon</text>
  <rect x="488" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="548" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Iluvatar</text>
  <rect x="624" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="684" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Intel / AMD CPU</text>
  <rect x="760" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="820" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">S3 / NFS / Ceph</text>
  <rect x="896" y="628" width="120" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="956" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Calico / Flannel</text>
  <rect x="1032" y="628" width="96" height="32" rx="8" fill="#111827" stroke="#334155"/>
  <text x="1080" y="649" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">+ more</text>
</svg>
