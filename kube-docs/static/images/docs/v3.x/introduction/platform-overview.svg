  <text x="840" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Deployments  / StatefulSets</text>
  <text x="840" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Jobs  / Pods  / Services</text>

