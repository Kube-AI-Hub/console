  <text x="136" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Cluster summary</text>
  <text x="136" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GPU / CPU usage</text>

  <!-- Nodes -->
  <rect x="232" y="82" width="160" height="80" rx="12" fill="#111827" stroke="#334155"/>
  <text x="312" y="116" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Nodes</text>
  <text x="312" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Cluster Nodes</text>
  <text x="312" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Edge Nodes  / GPU Cards</text>

  <!-- Service Components -->
  <rect x="408" y="82" width="160" height="80" rx="12" fill="#111827" stroke="#334155"/>
  <text x="488" y="116" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Service Components</text>
  <text x="488" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">System component</text>
  <text x="488" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">health &amp; status</text>

  <!-- Projects -->
  <rect x="584" y="82" width="160" height="80" rx="12" fill="#111827" stroke="#334155"/>
  <text x="664" y="116" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Projects</text>
  <text x="664" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Namespace isolation</text>
  <text x="664" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Multi-tenant workspaces</text>

