  <rect x="76" y="510" width="140" height="36" rx="8" fill="#111827" stroke="#334155"/>
  <text x="146" y="533" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Platform Admin</text>
