  <text x="186" y="232" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">PVC  / Storage Classes</text>
  <text x="186" y="248" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Volume Snapshots  / Snapshot Classes</text>

