  <text x="1040" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Secrets  / ConfigMaps</text>
  <text x="1040" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Service Accounts</text>

