  <text x="230" y="417" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">算力资源管理（K8S）</text>
  <rect x="400" y="392" width="336" height="40" rx="8" fill="#172033" stroke="#334155"/>
  <text x="568" y="417" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">服务管理（K8S）</text>

  <rect x="780" y="326" width="364" height="116" rx="12" fill="#1E0A3C" stroke="#6D28D9"/>
  <rect x="800" y="342" width="324" height="40" rx="8" fill="#2D1060" stroke="#7C3AED"/>
  <text x="962" y="367" fill="#C4B5FD" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">异构GPU算力虚拟化</text>
  <rect x="800" y="392" width="324" height="40" rx="8" fill="#2D1060" stroke="#7C3AED"/>
  <text x="962" y="417" fill="#C4B5FD" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">GPU算力调度</text>

  <!-- Connectors -->
  <line x1="400" y1="442" x2="400" y2="458" stroke="#334155" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="962" y1="442" x2="962" y2="458" stroke="#6D28D9" stroke-width="2" stroke-dasharray="4,3"/>

