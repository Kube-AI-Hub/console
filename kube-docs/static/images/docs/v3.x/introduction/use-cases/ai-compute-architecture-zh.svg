  <text x="156" y="652" fill="#38BDF8" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">支持国产GPU</text>

  <!-- CPU Cluster -->
  <rect x="444" y="482" width="364" height="188" rx="14" fill="#0D1B2A" stroke="#1E3A5F"/>
  <text x="626" y="508" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">CPU集群管理</text>
  <line x1="464" y1="516" x2="788" y2="516" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="464" y="528" width="84" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="473" y="535" width="66" height="42" rx="6" fill="#1E293B"/>
  <text x="506" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">INTEL</text>
  <rect x="564" y="528" width="84" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="573" y="535" width="66" height="42" rx="6" fill="#1E293B"/>
  <text x="606" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">AMD</text>
  <rect x="664" y="528" width="84" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="673" y="535" width="66" height="42" rx="6" fill="#1E293B"/>
  <text x="706" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">海光</text>
  <rect x="538" y="596" width="110" height="28" rx="8" fill="#111827" stroke="#334155"/>
  <text x="593" y="615" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">…更多厂商</text>
  <rect x="464" y="636" width="160" height="22" rx="11" fill="#0C2A4A"/>
  <text x="544" y="652" fill="#38BDF8" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">支持国产CPU</text>

  <!-- File Storage -->
  <rect x="832" y="482" width="312" height="188" rx="14" fill="#0D1B2A" stroke="#1E3A5F"/>
  <text x="988" y="508" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">文件存储资源</text>
  <line x1="852" y1="516" x2="1124" y2="516" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="852" y="528" width="80" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="861" y="535" width="62" height="42" rx="6" fill="#1E293B"/>
  <text x="892" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">S3</text>
  <rect x="948" y="528" width="80" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="957" y="535" width="62" height="42" rx="6" fill="#1E293B"/>
  <text x="988" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">NFS</text>
  <rect x="1044" y="528" width="80" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="1053" y="535" width="62" height="42" rx="6" fill="#1E293B"/>
  <text x="1084" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">……</text>
  <rect x="912" y="596" width="110" height="28" rx="8" fill="#111827" stroke="#334155"/>
  <text x="967" y="615" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">…更多类型</text>
  <rect x="852" y="636" width="150" height="22" rx="11" fill="#1E1040"/>
  <text x="927" y="652" fill="#A78BFA" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">分布式存储</text>
</svg>
