  <text x="56" y="474" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" font-weight="600">硬件集群</text>

  <!-- GPU Cluster -->
  <rect x="56" y="482" width="364" height="188" rx="14" fill="#0D1B2A" stroke="#1E3A5F"/>
  <text x="238" y="508" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">GPU集群管理</text>
