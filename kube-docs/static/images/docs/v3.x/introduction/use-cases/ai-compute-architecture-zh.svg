<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" rx="24" fill="#0F172A"/>

  <!-- Title -->
  <text x="56" y="56" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">AI算力管理平台产品架构</text>
  <text x="56" y="88" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16">从用户身份与权限到异构GPU/CPU硬件集群的分层架构设计。</text>
  <line x1="56" y1="108" x2="1144" y2="108" stroke="#1E293B" stroke-width="1"/>

  <!-- Layer 1: User & Permissions -->
  <text x="56" y="134" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" font-weight="600">用户&amp;权限</text>
  <rect x="56" y="142" width="1088" height="52" rx="12" fill="#111827" stroke="#334155"/>
  <rect x="76" y="154" width="320" height="28" rx="8" fill="#1E293B"/>
  <text x="236" y="173" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">标准认证</text>
  <rect x="440" y="154" width="320" height="28" rx="8" fill="#1E293B"/>
  <text x="600" y="173" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">自定义认证</text>
  <rect x="804" y="154" width="320" height="28" rx="8" fill="#1E293B"/>
  <text x="964" y="173" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">多租户隔离</text>

  <!-- Connector -->
  <line x1="600" y1="194" x2="600" y2="210" stroke="#334155" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Layer 2: Cluster Management -->
  <text x="56" y="226" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" font-weight="600">集群管理</text>
  <rect x="56" y="234" width="1088" height="52" rx="12" fill="#111827" stroke="#334155"/>
  <rect x="76" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="154" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">节点</text>
  <rect x="248" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="326" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">组</text>
  <rect x="420" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="498" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">容器</text>
  <rect x="592" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="670" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">存储</text>
  <rect x="764" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="842" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">监控</text>
  <rect x="936" y="246" width="156" height="28" rx="8" fill="#1E293B"/>
  <text x="1014" y="265" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">日志</text>

  <!-- Connector -->
  <line x1="600" y1="286" x2="600" y2="302" stroke="#334155" stroke-width="2" stroke-dasharray="4,3"/>

