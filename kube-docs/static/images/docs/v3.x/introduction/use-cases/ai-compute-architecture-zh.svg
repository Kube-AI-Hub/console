  <text x="830" y="318" fill="#A78BFA" font-family="Arial, sans-serif" font-size="12" font-weight="600">vGPU</text>

  <rect x="56" y="326" width="700" height="116" rx="12" fill="#0F1F35" stroke="#1E3A5F"/>
  <rect x="76" y="342" width="308" height="40" rx="8" fill="#172033" stroke="#334155"/>
  <text x="230" y="367" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">应用管理（helm charts）</text>
  <rect x="400" y="342" width="336" height="40" rx="8" fill="#172033" stroke="#334155"/>
  <text x="568" y="367" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">产品仓库（harbor）</text>
