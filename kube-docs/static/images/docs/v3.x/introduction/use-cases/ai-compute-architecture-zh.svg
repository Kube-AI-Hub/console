  <rect x="159" y="535" width="46" height="42" rx="6" fill="#1E293B"/>
  <text x="182" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">寒武纪</text>
  <rect x="228" y="528" width="60" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="235" y="535" width="46" height="42" rx="6" fill="#1E293B"/>
  <text x="258" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">华为</text>
  <rect x="304" y="528" width="60" height="56" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="311" y="535" width="46" height="42" rx="6" fill="#1E293B"/>
  <text x="334" y="561" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">天数</text>
  <rect x="154" y="596" width="110" height="28" rx="8" fill="#111827" stroke="#334155"/>
  <text x="209" y="615" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">…更多厂商</text>
