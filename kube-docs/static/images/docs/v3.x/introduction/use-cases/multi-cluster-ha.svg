<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" fill="none">
  <rect width="1200" height="480" rx="24" fill="#0F172A"/>
  <text x="56" y="60" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">Multi-cluster High Availability</text>
  <text x="56" y="94" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">A global VIP or DNS entry distributes traffic across clusters and can fail over to a healthy region.</text>

  <rect x="472" y="126" width="256" height="82" rx="18" fill="#1D4ED8" fill-opacity=".18" stroke="#60A5FA"/>
  <text x="552" y="160" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700">VIP / DNS</text>
  <text x="522" y="190" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="16">Global entry for user traffic</text>

  <rect x="94" y="278" width="264" height="126" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="468" y="278" width="264" height="126" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="842" y="278" width="264" height="126" rx="18" fill="#111827" stroke="#334155"/>
  <text x="148" y="322" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700">Cluster A</text>
  <text x="522" y="322" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700">Cluster B</text>
  <text x="896" y="322" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700">Cluster C</text>
  <text x="148" y="352" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Primary workload replicas</text>
  <text x="522" y="352" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Standby or active-active</text>
  <text x="896" y="352" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Regional failover target</text>

  <path d="M600 208V246" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M226 278V246H974V278" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="600" cy="246" r="6" fill="#94A3B8"/>
</svg>
