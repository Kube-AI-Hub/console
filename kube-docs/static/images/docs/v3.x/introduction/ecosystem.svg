  <text x="600" y="278" fill="#7C3AED" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Kubernetes-native AI Compute Platform</text>

  <!-- Category boxes -->

  <!-- GPU & Scheduling -->
  <rect x="56" y="100" width="220" height="140" rx="14" fill="#0A1929" stroke="#1E3A5F"/>
  <text x="166" y="126" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">GPU &amp; Scheduling</text>
  <line x1="76" y1="134" x2="256" y2="134" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="76" y="144" width="160" height="26" rx="6" fill="#111827" stroke="#334155"/>
  <text x="156" y="161" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">NVIDIA DCGM</text>
