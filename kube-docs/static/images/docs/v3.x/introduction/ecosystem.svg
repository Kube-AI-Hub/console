<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none">
  <rect width="1200" height="560" rx="20" fill="#0F172A"/>

  <!-- Title -->
  <text x="600" y="46" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Kube AI Hub Ecosystem</text>
  <text x="600" y="70" fill="#64748B" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Integrated open-source tools for AI compute management — all loosely coupled and optional</text>
  <line x1="56" y1="84" x2="1144" y2="84" stroke="#1E293B" stroke-width="1"/>

  <!-- Center: Kube AI Hub -->
  <rect x="476" y="220" width="248" height="72" rx="16" fill="#1E0A3C" stroke="#7C3AED"/>
