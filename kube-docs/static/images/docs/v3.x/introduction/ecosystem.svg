  <line x1="944" y1="294" x2="1124" y2="294" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="944" y="304" width="160" height="26" rx="6" fill="#111827" stroke="#334155"/>
  <text x="1024" y="321" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Calico / Flannel</text>
  <rect x="944" y="338" width="160" height="26" rx="6" fill="#111827" stroke="#334155"/>
  <text x="1024" y="355" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OpenELB (LB)</text>
  <rect x="944" y="372" width="160" height="26" rx="6" fill="#111827" stroke="#334155"/>
  <text x="1024" y="389" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">KubeEdge</text>

  <!-- Connector lines from center to boxes -->
  <line x1="476" y1="256" x2="276" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="476" y1="270" x2="276" y2="330" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="476" y1="244" x2="552" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="476" y1="278" x2="552" y2="430" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="724" y1="244" x2="648" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="724" y1="278" x2="648" y2="430" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="724" y1="256" x2="924" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="724" y1="270" x2="924" y2="330" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <text x="600" y="530" fill="#475569" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">All components are loosely coupled — enable only what you need</text>
