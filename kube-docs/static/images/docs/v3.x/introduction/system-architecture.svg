<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none">
  <rect width="1200" height="560" rx="24" fill="#0F172A"/>
  <text x="56" y="60" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">System Architecture</text>
  <text x="56" y="94" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">Frontend and backend are decoupled, while platform services run on Kubernetes and integrate with cloud-native components.</text>

  <rect x="56" y="134" width="320" height="120" rx="18" fill="#111827" stroke="#334155"/>
  <text x="80" y="172" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Access Layer</text>
  <text x="80" y="208" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Users and External Systems</text>
  <text x="80" y="236" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Browser, CLI, automation, and API clients</text>

  <rect x="440" y="134" width="320" height="120" rx="18" fill="#1E293B" stroke="#334155"/>
  <text x="464" y="172" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Kube AI Hub</text>
  <text x="464" y="208" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">ks-console and ks-apiserver</text>
  <text x="464" y="236" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Web UI, REST APIs, auth, and orchestration</text>

  <rect x="824" y="134" width="320" height="120" rx="18" fill="#111827" stroke="#334155"/>
  <text x="848" y="172" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Control Services</text>
  <text x="848" y="208" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Controller and Integrations</text>
  <text x="848" y="236" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">RBAC, app lifecycle, logging, and events</text>

  <rect x="56" y="304" width="1088" height="96" rx="18" fill="#0B1220" stroke="#334155"/>
  <text x="80" y="340" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Platform Components</text>
  <text x="80" y="374" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18">Monitoring · Logging · DevOps · Service Mesh · Notification · OpenPitrix · Storage · Network</text>

  <rect x="56" y="430" width="1088" height="84" rx="18" fill="#111827" stroke="#334155"/>
  <text x="80" y="464" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Kubernetes Foundation</text>
  <text x="80" y="495" fill="#38BDF8" font-family="Arial, sans-serif" font-size="20" font-weight="700">Any compatible Kubernetes cluster across data center, cloud, VM, or edge environments</text>

