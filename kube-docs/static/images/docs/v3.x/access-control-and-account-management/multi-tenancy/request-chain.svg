<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="800" viewBox="0 0 1060 800" fill="none">
  <rect width="1060" height="800" fill="#14215a"/>

  <!-- Title -->
  <text x="530" y="40" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Authentication &amp; Authorization</text>

  <!-- ks-console top bar -->
  <rect x="60" y="62" width="760" height="38" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.5"/>
  <text x="440" y="86" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">ks-console</text>

  <!-- Arrow: ks-console -> ks-apiserver -->
  <line x1="440" y1="100" x2="440" y2="120" stroke="#7dd3fc" stroke-width="1.5"/>
  <polygon points="434,117 440,128 446,117" fill="#7dd3fc"/>

  <!-- ks-apiserver outer box: y=128, h=636 (bottom=764, but clipped to 740) -->
  <rect x="60" y="128" width="760" height="636" rx="6" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.5"/>
  <text x="440" y="152" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">ks-apiserver</text>

  <!-- =============================================
       identity provider plugin: y=170, h=220, center=280
       authentication filter aligns with this center → y=258
  ============================================= -->
  <rect x="444" y="170" width="280" height="220" rx="8" fill="#1f3380" stroke="#334d9a" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="584" y="190" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">identity provider plugin</text>

  <rect x="460" y="198" width="192" height="34" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="220" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">LDAP identity provider</text>
  <line x1="652" y1="215" x2="698" y2="215" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="695,209 706,215 695,221" fill="#94a3b8"/>

  <rect x="460" y="244" width="192" height="34" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="266" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OAuth2 identity provider</text>
  <line x1="652" y1="261" x2="698" y2="261" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="695,255 706,261 695,267" fill="#94a3b8"/>

  <rect x="460" y="290" width="192" height="34" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="312" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Other identity provider</text>
  <line x1="652" y1="307" x2="698" y2="307" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="695,301 706,307 695,313" fill="#94a3b8"/>

  <!-- identity provider right panel: y=184, h=172 -->
  <rect x="706" y="184" width="196" height="172" rx="8" fill="#1a2b6b" stroke="#334d9a" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="804" y="204" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">identity provider</text>

  <rect x="718" y="210" width="172" height="32" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="231" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">LDAP/AD Server</text>

  <rect x="718" y="250" width="172" height="32" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="271" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OAuth2 Server</text>

  <rect x="718" y="290" width="172" height="32" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="311" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">CAS/OIDC Server</text>

