  <text x="584" y="440" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">union authorizer</text>

  <rect x="460" y="448" width="192" height="30" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="468" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">API path authorizer</text>

  <rect x="460" y="486" width="192" height="30" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="506" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">RBAC authorizer</text>

  <rect x="460" y="524" width="192" height="30" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="544" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OPA: rego</text>

  <rect x="460" y="562" width="192" height="30" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="556" y="582" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Role: policy rules</text>

  <!-- api aggregation: y=570, h=128, center=634 — aligns with dispatch filter -->
  <rect x="706" y="570" width="196" height="128" rx="8" fill="#1a2b6b" stroke="#334d9a" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="804" y="590" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">api aggregation</text>

  <rect x="718" y="598" width="172" height="30" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="618" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">kube-apiserver</text>

  <rect x="718" y="636" width="172" height="30" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="656" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">aggregation apiserver</text>

  <rect x="718" y="672" width="172" height="26" rx="3" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="804" y="690" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">multi-cluster dispatch</text>

  <!-- request chain box -->
  <rect x="80" y="162" width="300" height="576" rx="8" fill="#1f3380" stroke="#334d9a" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="230" y="182" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">request chain</text>

  <!-- authentication filter: top=258, center=280 -->
  <rect x="100" y="258" width="260" height="44" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="230" y="285" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">authentication filter</text>

  <!-- Arrow: authentication filter -> identity provider plugin (horizontal y=280) -->
  <line x1="360" y1="280" x2="430" y2="280" stroke="#94a3b8" stroke-width="1.2"/>
  <polygon points="427,274 438,280 427,286" fill="#94a3b8"/>

  <!-- Arrow down: auth -> authorization -->
  <line x1="230" y1="302" x2="230" y2="500" stroke="#7dd3fc" stroke-width="1.5"/>
  <polygon points="224,497 230,508 236,497" fill="#7dd3fc"/>

  <!-- authorization filter: top=508, center=530 -->
  <rect x="100" y="508" width="260" height="44" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="230" y="535" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">authorization filter</text>

  <!-- Arrow: authorization filter -> union authorizer (horizontal y=530) -->
  <line x1="360" y1="530" x2="440" y2="530" stroke="#94a3b8" stroke-width="1.2"/>
  <polygon points="437,524 448,530 437,536" fill="#94a3b8"/>

  <!-- Arrow down: authorization -> dispatch -->
  <line x1="230" y1="552" x2="230" y2="604" stroke="#7dd3fc" stroke-width="1.5"/>
  <polygon points="224,601 230,612 236,601" fill="#7dd3fc"/>

  <!-- dispatch filter: top=612, center=634 -->
  <rect x="100" y="612" width="260" height="44" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="230" y="639" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">dispatch filter</text>

  <!-- Arrow: dispatch filter -> api aggregation (dashed horizontal y=634) -->
  <line x1="360" y1="634" x2="704" y2="634" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <polygon points="701,628 712,634 701,640" fill="#94a3b8"/>

  <!-- Arrow down: dispatch -> request handler -->
  <line x1="230" y1="656" x2="230" y2="686" stroke="#7dd3fc" stroke-width="1.5"/>
  <polygon points="224,683 230,694 236,683" fill="#7dd3fc"/>

  <!-- request handler: top=694, bottom=738 -->
  <rect x="100" y="694" width="260" height="44" rx="4" fill="#14215a" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="230" y="721" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">request handler</text>

</svg>
