<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" fill="none">
  <rect width="900" height="480" fill="#14215a"/>

  <!-- Participant boxes top -->
  <rect x="20" y="14" width="120" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="80" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x524D;&#x7AEF;</text>

  <rect x="234" y="14" width="152" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="310" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Kube AI Hub</text>

  <rect x="456" y="14" width="208" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="560" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x6388;&#x6743;&#x670D;&#x52A1;&#x5668;</text>

  <rect x="722" y="14" width="160" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="802" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x8D44;&#x6E90;&#x670D;&#x52A1;&#x5668;</text>

  <!-- Lifelines -->
  <line x1="80"  y1="46" x2="80"  y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="310" y1="46" x2="310" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="560" y1="46" x2="560" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="802" y1="46" x2="802" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- step 1: Front end -> Kube AI Hub -->
  <line x1="80" y1="80" x2="298" y2="80" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="296,75 308,80 296,85" fill="#7dd3fc"/>
  <text x="190" y="73" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OAuth 2.0 &#x767B;&#x5F55;&#x8BF7;&#x6C42;</text>

  <!-- step 2: Kube AI Hub -> Front end (redirect) -->
  <line x1="310" y1="106" x2="92" y2="106" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,101 82,106 94,111" fill="#7dd3fc"/>
  <text x="190" y="99" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x643A; client_id &#x91CD;&#x5B9A;&#x5411;&#x81F3;&#x6388;&#x6743;&#x670D;&#x52A1;&#x5668;</text>

  <!-- step 3: Front end -> Authorization server -->
  <line x1="80" y1="134" x2="548" y2="134" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="546,129 558,134 546,139" fill="#7dd3fc"/>
  <text x="315" y="127" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x6388;&#x6743;&#x8BF7;&#x6C42;</text>

  <!-- step 4: Authorization server -> Front end (grant code) -->
  <line x1="560" y1="160" x2="92" y2="160" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,155 82,160 94,165" fill="#7dd3fc"/>
  <text x="315" y="153" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x643A;&#x6388;&#x6743;&#x7801;&#x91CD;&#x5B9A;&#x5411;&#x81F3; ks-console</text>

  <!-- step 5: Front end -> Kube AI Hub (grant code login) -->
  <line x1="80" y1="188" x2="298" y2="188" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="296,183 308,188 296,193" fill="#7dd3fc"/>
  <text x="190" y="181" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x643A;&#x6388;&#x6743;&#x7801;&#x7684;&#x767B;&#x5F55;&#x8BF7;&#x6C42;</text>

  <!-- step 6: Kube AI Hub -> Authorization server (authorize by grant code) -->
  <line x1="310" y1="216" x2="548" y2="216" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="546,211 558,216 546,221" fill="#7dd3fc"/>
  <text x="430" y="209" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x901A;&#x8FC7;&#x6388;&#x6743;&#x7801;&#x9274;&#x6743;</text>

  <!-- step 7: Authorization server -> Kube AI Hub (tokens) -->
  <line x1="560" y1="244" x2="322" y2="244" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="324,239 312,244 324,249" fill="#7dd3fc"/>
  <text x="430" y="237" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">access_token &amp; refresh_token</text>

  <!-- step 8: Kube AI Hub -> Resource server (user info request) -->
  <line x1="310" y1="272" x2="790" y2="272" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="788,267 800,272 788,277" fill="#7dd3fc"/>
  <text x="550" y="265" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x83B7;&#x53D6;&#x7528;&#x6237;&#x4FE1;&#x606F;&#x8BF7;&#x6C42;</text>

  <!-- note: authorize by access_token -->
  <rect x="644" y="279" width="156" height="26" rx="4" fill="#1f2d5a" stroke="#334d9a" stroke-width="1"/>
  <text x="722" y="296" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">&#x901A;&#x8FC7; access_token &#x9274;&#x6743;</text>

  <!-- step 9: Resource server -> Kube AI Hub (user info response) -->
  <line x1="802" y1="318" x2="322" y2="318" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="324,313 312,318 324,323" fill="#7dd3fc"/>
  <text x="560" y="311" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x8FD4;&#x56DE;&#x7528;&#x6237;&#x4FE1;&#x606F;</text>

  <!-- step 10: Kube AI Hub self-loop (user exists?) -->
  <line x1="310" y1="348" x2="360" y2="348" stroke="#7dd3fc" stroke-width="1.3"/>
  <line x1="360" y1="348" x2="360" y2="366" stroke="#7dd3fc" stroke-width="1.3"/>
  <line x1="360" y1="366" x2="310" y2="366" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="322,362 312,366 322,370" fill="#7dd3fc"/>
  <text x="340" y="343" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">&#x7528;&#x6237;&#x662F;&#x5426;&#x5B58;&#x5728;&#xFF1F;</text>

  <!-- note: create user if not exist -->
  <rect x="374" y="343" width="148" height="26" rx="4" fill="#1f2d5a" stroke="#334d9a" stroke-width="1"/>
  <text x="448" y="360" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">&#x82E5;&#x4E0D;&#x5B58;&#x5728;&#x5219;&#x521B;&#x5EFA;&#x7528;&#x6237;</text>

  <!-- step 11: Kube AI Hub -> Front end (JWT) -->
  <line x1="310" y1="400" x2="92" y2="400" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,395 82,400 94,405" fill="#7dd3fc"/>
  <text x="190" y="393" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">JWT</text>

  <!-- Participant boxes bottom -->
  <rect x="20" y="446" width="120" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="80" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x524D;&#x7AEF;</text>

  <rect x="234" y="446" width="152" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="310" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Kube AI Hub</text>

  <rect x="456" y="446" width="208" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="560" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x6388;&#x6743;&#x670D;&#x52A1;&#x5668;</text>

  <rect x="722" y="446" width="160" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="802" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">&#x8D44;&#x6E90;&#x670D;&#x52A1;&#x5668;</text>

</svg>
