<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" fill="none">
  <rect width="900" height="480" fill="#14215a"/>

  <!-- Participant boxes top -->
  <!-- Front end: cx=80 -->
  <rect x="20" y="14" width="120" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="80" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Front end</text>

  <!-- Kube AI Hub: cx=310 -->
  <rect x="242" y="14" width="136" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="310" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Kube AI Hub</text>

  <!-- Authorization server: cx=560 -->
  <rect x="460" y="14" width="200" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="560" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Authorization server</text>

  <!-- Resource server: cx=800 -->
  <rect x="726" y="14" width="148" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="800" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Resource server</text>

  <!-- Lifelines -->
  <line x1="80"  y1="46" x2="80"  y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="310" y1="46" x2="310" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="560" y1="46" x2="560" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="800" y1="46" x2="800" y2="446" stroke="#334d9a" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ① Front end -> Kube AI Hub: OAuth 2.0 login request -->
  <line x1="80" y1="80" x2="298" y2="80" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="296,75 308,80 296,85" fill="#7dd3fc"/>
  <text x="190" y="73" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">OAuth 2.0 login request</text>

  <!-- ② Kube AI Hub -> Front end: Redirect to auth server with client_id -->
  <line x1="310" y1="106" x2="92" y2="106" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,101 82,106 94,111" fill="#7dd3fc"/>
  <text x="190" y="99" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Redirect to auth server with client_id</text>

  <!-- ③ Front end -> Authorization server: Grant request -->
  <line x1="80" y1="134" x2="548" y2="134" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="546,129 558,134 546,139" fill="#7dd3fc"/>
  <text x="315" y="127" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Grant request</text>

  <!-- ④ Authorization server -> Front end: Redirect with grant code -->
  <line x1="560" y1="160" x2="92" y2="160" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,155 82,160 94,165" fill="#7dd3fc"/>
  <text x="315" y="153" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Redirect to ks-console with the grant code</text>

  <!-- ⑤ Front end -> Kube AI Hub: Login request with grant code -->
  <line x1="80" y1="188" x2="298" y2="188" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="296,183 308,188 296,193" fill="#7dd3fc"/>
  <text x="190" y="181" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Login request with the grant code</text>

  <!-- ⑥ Kube AI Hub -> Authorization server: Authorize by grant code -->
  <line x1="310" y1="216" x2="548" y2="216" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="546,211 558,216 546,221" fill="#7dd3fc"/>
  <text x="430" y="209" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Authorize by grant code</text>

  <!-- ⑦ Authorization server -> Kube AI Hub: access_token & refresh_token -->
  <line x1="560" y1="244" x2="322" y2="244" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="324,239 312,244 324,249" fill="#7dd3fc"/>
  <text x="430" y="237" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">access_token &amp; refresh_token</text>

  <!-- ⑧ Kube AI Hub -> Resource server: Describe the user request -->
  <line x1="310" y1="272" x2="788" y2="272" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="786,267 798,272 786,277" fill="#7dd3fc"/>
  <text x="550" y="265" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Describe the user request</text>

  <!-- note: Authorize by access_token -->
  <rect x="642" y="279" width="156" height="26" rx="4" fill="#1f2d5a" stroke="#334d9a" stroke-width="1"/>
  <text x="720" y="296" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Authorize by access_token</text>

  <!-- ⑨ Resource server -> Kube AI Hub: Describe the user response -->
  <line x1="800" y1="318" x2="322" y2="318" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="324,313 312,318 324,323" fill="#7dd3fc"/>
  <text x="560" y="311" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Describe the user response</text>

  <!-- ⑩ Kube AI Hub self-loop: User exists? -->
  <line x1="310" y1="348" x2="360" y2="348" stroke="#7dd3fc" stroke-width="1.3"/>
  <line x1="360" y1="348" x2="360" y2="366" stroke="#7dd3fc" stroke-width="1.3"/>
  <line x1="360" y1="366" x2="310" y2="366" stroke="#7dd3fc" stroke-width="1.3"/>
  <polygon points="312,361 310,366 321,366" fill="none"/>
  <polygon points="322,362 312,366 322,370" fill="#7dd3fc"/>
  <text x="340" y="343" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">User exists?</text>

  <!-- note: If not, create the user -->
  <rect x="374" y="343" width="142" height="26" rx="4" fill="#1f2d5a" stroke="#334d9a" stroke-width="1"/>
  <text x="445" y="360" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">If not, create the user</text>

  <!-- ⑪ Kube AI Hub -> Front end: JWT -->
  <line x1="310" y1="400" x2="92" y2="400" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="94,395 82,400 94,405" fill="#7dd3fc"/>
  <text x="190" y="393" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">JWT</text>

  <!-- Participant boxes bottom -->
  <rect x="20" y="446" width="120" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="80" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Front end</text>

  <rect x="242" y="446" width="136" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="310" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Kube AI Hub</text>

  <rect x="460" y="446" width="200" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="560" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Authorization server</text>

  <rect x="726" y="446" width="148" height="32" rx="4" fill="#1a2b6b" stroke="#2c3a7c" stroke-width="1.2"/>
  <text x="800" y="467" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Resource server</text>

</svg>
