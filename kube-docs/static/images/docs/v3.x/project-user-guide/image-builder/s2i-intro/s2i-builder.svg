<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" fill="none">
  <rect width="900" height="340" rx="16" fill="#0F172A"/>
  <text x="450" y="38" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">S2I Image Builder &#x2014; Interpreted Language Build Workflow</text>
  <text x="450" y="60" fill="#64748B" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Build-time and runtime share the same environment (e.g. Python, Ruby)</text>

  <!-- Source Code box -->
  <rect x="40" y="90" width="160" height="80" rx="12" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="120" y="126" fill="#93C5FD" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Source Code</text>
  <text x="120" y="146" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Git Repository</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="130" x2="248" y2="130" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="244,124 256,130 244,136" fill="#475569"/>
  <text x="224" y="122" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">inject</text>

  <!-- Image Builder box -->
  <rect x="256" y="76" width="220" height="108" rx="12" fill="#312E81" stroke="#6366F1" stroke-width="1.5"/>
  <text x="366" y="108" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Image Builder</text>
  <text x="366" y="128" fill="#818CF8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Bundler / Rake / GCC</text>
  <text x="366" y="146" fill="#818CF8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Apache / Runtime Deps</text>
  <text x="366" y="164" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">assemble script</text>

  <!-- Arrow 2 -->
  <line x1="476" y1="130" x2="524" y2="130" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="520,124 532,130 520,136" fill="#475569"/>
  <text x="500" y="122" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">commit</text>

  <!-- App Image box -->
  <rect x="532" y="90" width="160" height="80" rx="12" fill="#14532D" stroke="#22C55E" stroke-width="1.5"/>
  <text x="612" y="124" fill="#86EFAC" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">App Image</text>
  <text x="612" y="144" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Ready to run</text>

  <!-- Arrow 3 -->
  <line x1="692" y1="130" x2="740" y2="130" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="736,124 748,130 736,136" fill="#475569"/>
  <text x="716" y="122" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">push</text>

  <!-- Registry box -->
  <rect x="748" y="90" width="120" height="80" rx="12" fill="#422006" stroke="#F97316" stroke-width="1.5"/>
  <text x="808" y="124" fill="#FDBA74" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Registry</text>
  <text x="808" y="144" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Docker Hub</text>

  <!-- run script note -->
  <rect x="532" y="196" width="160" height="36" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="612" y="219" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Entrypoint: run script</text>
  <line x1="612" y1="170" x2="612" y2="196" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Key note at bottom -->
  <rect x="40" y="264" width="820" height="52" rx="10" fill="#111827" stroke="#1E293B"/>
  <text x="450" y="288" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">The Image Builder contains all build-time and runtime dependencies.</text>
  <text x="450" y="306" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">S2I injects source code, runs the assemble script, sets the run script as entrypoint, then commits the final image.</text>
</svg>
