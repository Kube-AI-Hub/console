<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" fill="none">
  <rect width="960" height="420" rx="16" fill="#0F172A"/>
  <text x="480" y="38" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">S2I Runtime Image &#x2014; Phased Build for Compiled Languages</text>
  <text x="480" y="60" fill="#64748B" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Go, C, C++, Java: separate build stage from runtime to produce slimmer images</text>

  <!-- Phase 1: Build -->
  <rect x="32" y="84" width="420" height="188" rx="12" fill="#111827" stroke="#312E81" stroke-width="1.5"/>
  <rect x="32" y="84" width="420" height="32" rx="12" fill="#312E81"/>
  <rect x="32" y="100" width="420" height="16" fill="#312E81"/>
  <text x="242" y="106" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Phase 1 &#x2014; Build Stage (Image Builder)</text>

  <rect x="52" y="128" width="120" height="60" rx="8" fill="#1E3A5F" stroke="#3B82F6"/>
  <text x="112" y="154" fill="#93C5FD" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Source Code</text>
  <text x="112" y="170" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">+ Compiler / Deps</text>

  <line x1="172" y1="158" x2="208" y2="158" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="204,152 216,158 204,164" fill="#475569"/>
  <text x="190" y="148" fill="#64748B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">compile</text>

  <rect x="216" y="128" width="120" height="60" rx="8" fill="#312E81" stroke="#6366F1"/>
  <text x="276" y="154" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Build Container</text>
  <text x="276" y="170" fill="#818CF8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">assemble script</text>

  <line x1="336" y1="158" x2="372" y2="158" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,3"/>
  <polygon points="368,152 380,158 368,164" fill="#F59E0B"/>
  <text x="354" y="148" fill="#F59E0B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">extract</text>

  <rect x="380" y="128" width="56" height="60" rx="8" fill="#78350F" stroke="#F59E0B"/>
  <text x="408" y="152" fill="#FDE68A" font-family="Arial, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Artifact</text>
  <text x="408" y="168" fill="#FCD34D" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">.jar / bin</text>

  <text x="242" y="240" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Compile source, run tests, produce executable artifact</text>
  <text x="242" y="258" fill="#475569" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Compiler and build tools remain inside this stage only</text>

  <!-- Center arrow -->
  <line x1="452" y1="178" x2="508" y2="178" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="504,172 516,178 504,184" fill="#F59E0B"/>
  <text x="480" y="168" fill="#F59E0B" font-family="Arial, sans-serif" font-size="10" font-weight="600" text-anchor="middle">inject artifact</text>

  <!-- Phase 2: Runtime -->
  <rect x="516" y="84" width="412" height="188" rx="12" fill="#111827" stroke="#14532D" stroke-width="1.5"/>
  <rect x="516" y="84" width="412" height="32" rx="12" fill="#14532D"/>
  <rect x="516" y="100" width="412" height="16" fill="#14532D"/>
  <text x="722" y="106" fill="#86EFAC" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Phase 2 &#x2014; Runtime Stage (Runtime Image)</text>

  <rect x="536" y="128" width="88" height="60" rx="8" fill="#78350F" stroke="#F59E0B"/>
  <text x="580" y="154" fill="#FDE68A" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Artifact</text>
  <text x="580" y="170" fill="#FCD34D" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">.jar / binary</text>

  <line x1="624" y1="158" x2="660" y2="158" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="656,152 668,158 656,164" fill="#475569"/>

  <rect x="668" y="128" width="120" height="60" rx="8" fill="#14532D" stroke="#22C55E"/>
  <text x="728" y="150" fill="#86EFAC" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Runtime Image</text>
  <text x="728" y="166" fill="#4ADE80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">JRE / libc only</text>
  <text x="728" y="180" fill="#64748B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">no compiler</text>

  <line x1="788" y1="158" x2="824" y2="158" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="820,152 832,158 820,164" fill="#475569"/>

  <rect x="832" y="128" width="80" height="60" rx="8" fill="#14532D" fill-opacity="0.8" stroke="#22C55E"/>
  <text x="872" y="154" fill="#86EFAC" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">App Image</text>
  <text x="872" y="170" fill="#4ADE80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Slim &#x2713;</text>

  <text x="722" y="240" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Only the artifact + minimal runtime are included</text>
  <text x="722" y="258" fill="#475569" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Compiler, build tools, source code are excluded &#x2192; much smaller image</text>

  <!-- Bottom note -->
  <rect x="32" y="302" width="896" height="88" rx="10" fill="#111827" stroke="#1E293B"/>
  <text x="480" y="330" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Key benefit: the final image only contains the artifact + runtime dependencies</text>
  <text x="480" y="352" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Build-time dependencies (compiler, headers, source code) are discarded after Phase 1.</text>
  <text x="480" y="372" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">This produces a significantly smaller and more secure production image.</text>
</svg>
