<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" fill="none">
  <rect width="860" height="300" rx="16" fill="#0F172A"/>
  <text x="430" y="38" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">B2I Image Builder &#x2014; Build Image Only (No Service)</text>
  <text x="430" y="60" fill="#64748B" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Use the Image Builder directly to build and push an image without deploying to Kubernetes</text>

  <!-- Artifact -->
  <rect x="32" y="90" width="140" height="76" rx="12" fill="#78350F" stroke="#F97316" stroke-width="1.5"/>
  <text x="102" y="124" fill="#FDBA74" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Artifact</text>
  <text x="102" y="142" fill="#F97316" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">JAR / WAR / bin</text>

  <line x1="172" y1="128" x2="212" y2="128" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="208,122 220,128 208,134" fill="#475569"/>

  <!-- B2I Builder -->
  <rect x="220" y="78" width="160" height="100" rx="12" fill="#312E81" stroke="#6366F1" stroke-width="1.5"/>
  <text x="300" y="114" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Image Builder</text>
  <text x="300" y="132" fill="#818CF8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">B2I (binary)</text>
  <text x="300" y="150" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Wraps artifact in container</text>
  <text x="300" y="166" fill="#64748B" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">image only</text>

  <line x1="380" y1="128" x2="420" y2="128" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="416,122 428,128 416,134" fill="#475569"/>
  <text x="400" y="118" fill="#64748B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">build</text>

  <!-- Docker Image -->
  <rect x="428" y="90" width="140" height="76" rx="12" fill="#14532D" stroke="#22C55E" stroke-width="1.5"/>
  <text x="498" y="124" fill="#86EFAC" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Docker Image</text>
  <text x="498" y="144" fill="#4ADE80" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">App image</text>

  <line x1="568" y1="128" x2="608" y2="128" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <polygon points="604,122 616,128 604,134" fill="#475569"/>
  <text x="588" y="118" fill="#64748B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">push</text>

  <!-- Registry -->
  <rect x="616" y="90" width="148" height="76" rx="12" fill="#422006" stroke="#F97316" stroke-width="1.5"/>
  <text x="690" y="124" fill="#FDBA74" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Registry</text>
  <text x="690" y="142" fill="#F97316" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Docker Hub / Harbor</text>

  <!-- No K8s note -->
  <rect x="32" y="196" width="796" height="80" rx="10" fill="#111827" stroke="#334155"/>
  <text x="430" y="224" fill="#94A3B8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Image Builder mode: image only, no Kubernetes deployment</text>
  <text x="430" y="248" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Navigate to Image Builders &#x2192; Create &#x2192; Select Binary &#x2192; Upload artifact &#x2192; Set image name and registry</text>
  <text x="430" y="266" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">The image is pushed to the target registry; no Service or Deployment is created in this workflow</text>
</svg>
