  <text x="72" y="218" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12" font-weight="600">Core Modules</text>
  <rect x="72" y="228" width="140" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="142" y="246" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Cluster Dashboard</text>
  <rect x="220" y="228" width="132" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="286" y="246" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">GPU Node Mgmt</text>
  <rect x="72" y="264" width="140" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="142" y="282" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Job Queue Scheduler</text>
  <rect x="220" y="264" width="132" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="286" y="282" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Monitoring &amp; Alerts</text>
  <rect x="72" y="300" width="140" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="142" y="318" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Tenant &amp; RBAC</text>
  <rect x="220" y="300" width="132" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="286" y="318" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Metering &amp; Billing</text>
  <rect x="72" y="336" width="140" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="142" y="354" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">App Marketplace</text>
  <rect x="220" y="336" width="132" height="28" rx="6" fill="#111827" stroke="#1E293B"/>
  <text x="286" y="354" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Log Explorer</text>

  <!-- Arrow Frontend ' API -->
  <line x1="368" y1="242" x2="430" y2="242" stroke="#334155" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="430,236 442,242 430,248" fill="#334155"/>
  <text x="400" y="232" fill="#475569" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">REST API</text>

