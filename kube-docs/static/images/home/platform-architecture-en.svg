<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <rect width="1200" height="420" rx="20" fill="#0F172A"/>

  <!-- Title -->
  <text x="600" y="44" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Kube AI Hub Platform Architecture</text>
  <text x="600" y="68" fill="#64748B" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Decoupled frontend/backend cloud-native architecture with Kubernetes as the compute kernel</text>
  <line x1="56" y1="84" x2="1144" y2="84" stroke="#1E293B" stroke-width="1"/>

  <!--  Frontend Panel  -->
  <rect x="48" y="100" width="320" height="284" rx="14" fill="#0D1B2A" stroke="#1E3A5F"/>
  <text x="208" y="128" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Frontend (Web Console)</text>
  <line x1="68" y1="138" x2="348" y2="138" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Frontend tech stack -->
  <rect x="72" y="152" width="88" height="36" rx="8" fill="#172033" stroke="#334155"/>
  <text x="116" y="175" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">React</text>

  <rect x="172" y="152" width="88" height="36" rx="8" fill="#172033" stroke="#334155"/>
  <text x="216" y="175" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">MobX</text>

  <rect x="272" y="152" width="80" height="36" rx="8" fill="#172033" stroke="#334155"/>
  <text x="312" y="175" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Koa</text>

