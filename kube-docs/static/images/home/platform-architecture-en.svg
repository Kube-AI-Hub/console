  <rect x="692" y="152" width="200" height="60" rx="8" fill="#111827" stroke="#334155"/>
  <text x="792" y="178" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">API Server</text>
  <text x="792" y="198" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Kubernetes API Proxy</text>

  <rect x="912" y="152" width="200" height="60" rx="8" fill="#111827" stroke="#334155"/>
  <text x="1012" y="178" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Controller Manager</text>
  <text x="1012" y="198" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Resource Controllers</text>

  <rect x="692" y="228" width="200" height="60" rx="8" fill="#111827" stroke="#334155"/>
  <text x="792" y="254" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Account Service</text>
  <text x="792" y="274" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Multi-tenant Identity</text>

  <rect x="912" y="228" width="200" height="60" rx="8" fill="#111827" stroke="#334155"/>
  <text x="1012" y="254" fill="#38BDF8" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">GPU Scheduler</text>
  <text x="1012" y="274" fill="#64748B" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">vGPU Scheduling Engine</text>

  <!-- Kubernetes layer -->
  <rect x="692" y="304" width="420" height="56" rx="8" fill="#0F1F35" stroke="#1E3A5F"/>
  <text x="902" y="330" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Kubernetes</text>
  <text x="902" y="350" fill="#475569" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GPU Clusters - CPU Clusters - File Storage</text>

  <!-- Connectors -->
  <line x1="792" y1="212" x2="792" y2="228" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1012" y1="212" x2="1012" y2="228" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="792" y1="288" x2="792" y2="304" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1012" y1="288" x2="1012" y2="304" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
