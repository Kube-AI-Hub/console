  <rect x="460" y="218" width="128" height="26" rx="6" fill="#2D1060" stroke="#7C3AED"/>
  <text x="524" y="235" fill="#DDD6FE" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Rate Limit / Circuit Breaker</text>
  <rect x="460" y="252" width="128" height="26" rx="6" fill="#2D1060" stroke="#7C3AED"/>
  <text x="524" y="269" fill="#DDD6FE" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Routing / Load Balance</text>
  <rect x="460" y="286" width="128" height="26" rx="6" fill="#2D1060" stroke="#7C3AED"/>
  <text x="524" y="303" fill="#DDD6FE" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Audit Logging</text>

  <!-- Arrow API ' Backend -->
  <line x1="604" y1="242" x2="660" y2="242" stroke="#334155" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="660,236 672,242 660,248" fill="#334155"/>

  <!--  Backend Panel  -->
  <rect x="672" y="100" width="480" height="284" rx="14" fill="#0D1B2A" stroke="#1E3A5F"/>
