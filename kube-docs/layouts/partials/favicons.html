{{ $basePath := strings.TrimSuffix "/" .Site.Params.logoLink }}
<link rel="shortcut icon" href='{{ $basePath }}/images/favicons/favicon.ico' >
<link rel="apple-touch-icon" href='{{ $basePath }}/images/favicons/favicon.svg'>
<link rel="icon" type="image/svg+xml" href='{{ $basePath }}/images/favicons/favicon.svg'>
<link rel="manifest" href='{{ $basePath }}/images/favicons/site.webmanifest'>
<link rel="mask-icon" href='{{ $basePath }}/images/favicons/safari-pinned-tab.svg' color="#a981f8">
<meta name="msapplication-config" content='{{ $basePath }}/images/favicons/browserconfig.xml' />
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="theme-color" content="#ffffff">
