  -->
  <!-- 三条平行斜线（线程符号），由左下到右上 -->
  <rect x="8"  y="8"  width="84" height="14" rx="7" transform="rotate(-38 50 50)"/>
  <rect x="8"  y="30" width="84" height="14" rx="7" transform="rotate(-38 50 50)"/>
  <rect x="8"  y="52" width="84" height="14" rx="7" transform="rotate(-38 50 50)"/>
</svg>
