<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!--
    海光 (Hygon) logo 标志：
    海光以"H"字型为核心标志，搭配芯片/电路感矩形外框
    官方 logo 为蓝色，单色版如下
  -->
  <!-- 外框矩形（圆角，模拟芯片轮廓） -->
  <rect x="6" y="6" width="88" height="88" rx="10" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- H 左竖 -->
  <rect x="22" y="24" width="14" height="52" rx="3"/>
  <!-- H 右竖 -->
  <rect x="64" y="24" width="14" height="52" rx="3"/>
  <!-- H 横梁 -->
  <rect x="22" y="43" width="56" height="14" rx="3"/>
</svg>
