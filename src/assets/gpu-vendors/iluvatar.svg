<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!--
    天数智芯 (Iluvatar CoreX) logo 标志：
    官方标志为两个向右的楔形/箭头叠加，象征算力加速与突破，
    取自其品牌视觉识别的几何箭头形态
  -->
  <!-- 大箭头（左侧，向右指） -->
  <polygon points="10,20 55,50 10,80 28,80 73,50 28,20"/>
  <!-- 小箭头（右侧，向右指，稍小） -->
  <polygon points="42,32 72,50 42,68 54,68 84,50 54,32"/>
</svg>
